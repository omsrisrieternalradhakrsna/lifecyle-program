name: Check sandbox availability

on:
  schedule:
    - cron: "7,22,37,52 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sandbox-availability-check
  cancel-in-progress: false

jobs:
  check:
    name: Check all endpoints
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Check live endpoints
        run: python -m src.checker --config config/targets.json
